services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: wf_engine
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d wf_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build: ./orchestrator
    container_name: orchestrator
    hostname: orchestrator
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wf_engine
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy

  example-worker-java:
    build: ./examples/java
    container_name: example-worker-java
    hostname: example-worker-java
    profiles:
      - java
      - all

  example-worker-python:
    build:
      context: .
      dockerfile: examples/python/Dockerfile
    container_name: example-worker-python
    hostname: example-worker-python
    profiles:
      - python
      - all

  example-worker-node:
    build:
      context: .
      dockerfile: examples/node/Dockerfile
    container_name: example-worker-node
    hostname: example-worker-node
    profiles:
      - node
      - all

volumes:
  postgres:
